<!--
  Usage in a React frontend:
    import MedikoLogoAnimated from "@shared-assets/MedikoLogoAnimated";
    ...
    <MedikoLogoAnimated />

  Icons used (react-icons/fa6):
    K slot: FaStethoscope → FaSyringe → FaHospital → FaXRay
    o slot: FaHeartPulse  → FaKitMedical → FaPills → FaUserDoctor

  Gradient: linearGradient id="koGrad" #41AD49 → #0072BC (horizontal)
  Applied via: .ko-fa-icon path { fill: url(#koGrad); }

  Flip animation: rotateY 0→90→90→0deg / opacity 1→0→0→1 over 0.5s
  K flips first, O follows 120ms later.
  After hover leave: 800ms delay → reset flip back to "Ko" gradient text.
  Cycles through 4 icon pairs on each hover.
-->

<style>
  /* kept for standalone preview only */
  @keyframes medikoFlipY {
    0%   { transform: rotateY(0deg);  opacity: 1; }
    40%  { transform: rotateY(90deg); opacity: 0; }
    60%  { transform: rotateY(90deg); opacity: 0; }
    100% { transform: rotateY(0deg);  opacity: 1; }
  }
</style>
