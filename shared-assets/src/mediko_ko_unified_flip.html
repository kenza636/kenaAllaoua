
<style>
  .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 320px;
    flex-direction: column;
    gap: 16px;
  }

  .logo-text {
    font-family: 'Segoe UI', sans-serif;
    font-size: 54px;
    font-weight: 800;
    letter-spacing: -2px;
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }

  .medi-part { color: var(--color-text-primary); }

  .ko-wrapper {
    display: inline-flex;
    align-items: center;
    perspective: 800px;
    position: relative;
  }

  .ko-flipper {
    display: inline-block;
    transform-style: preserve-3d;
    position: relative;
    width: 80px;
    height: 64px;
  }

  .ko-front, .ko-back {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .ko-front {
    transform: rotateY(0deg);
  }

  .ko-back {
    transform: rotateY(180deg);
  }

  .ko-text {
    font-family: 'Segoe UI', sans-serif;
    font-size: 54px;
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(90deg, #41AD49, #0072BC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .ko-icon {
    width: 58px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ko-flipper {
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .ko-flipper.flipped {
    transform: rotateY(180deg);
  }

  .icon-label {
    font-size: 12px;
    color: var(--color-text-tertiary);
    font-family: var(--font-sans);
    letter-spacing: 0.06em;
    min-height: 18px;
    text-align: center;
    text-transform: uppercase;
    transition: opacity 0.3s ease;
  }

  .hint {
    font-size: 13px;
    color: var(--color-text-secondary);
    letter-spacing: 0.02em;
  }
</style>

<div class="logo-wrap">
  <h2 class="sr-only">Mediko animated logo — Ko letters flip as one to reveal monochrome medical icons on hover</h2>

  <div class="logo-text" id="logo">
    <span class="medi-part">Medi</span>
    <span class="ko-wrapper">
      <span class="ko-flipper" id="ko-flipper">
        <span class="ko-front">
          <span class="ko-text">Ko</span>
        </span>
        <span class="ko-back" id="ko-back">
          <span class="ko-icon" id="ko-icon"></span>
        </span>
      </span>
    </span>
  </div>

  <div class="icon-label" id="icon-label"></div>
  <div class="hint">hover the logo</div>
</div>

    svg: `<svg viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg" width="58" height="58">

      <line x1="34" y1="20" x2="38" y2="20" stroke="url(#g6)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>`
  }
];

let current = 0;
let flipped = false;
const flipper = document.getElementById('ko-flipper');
const koBack  = document.getElementById('ko-back');
const koIcon  = document.getElementById('ko-icon');
const lbl     = document.getElementById('icon-label');
const logo    = document.getElementById('logo');

function showIcon(idx) {
  koIcon.innerHTML = icons[idx].svg;
  lbl.textContent  = icons[idx].label;
}

showIcon(0);

logo.addEventListener('mouseenter', () => {
  if (!flipped) {
    showIcon(current % icons.length);
    flipper.classList.add('flipped');
    flipped = true;
  }
});

logo.addEventListener('mouseleave', () => {
  if (flipped) {
    flipper.classList.remove('flipped');
    flipped = false;
    current++;
    lbl.textContent = '';
    setTimeout(() => showIcon(current % icons.length), 300);
  }
});
</script>
