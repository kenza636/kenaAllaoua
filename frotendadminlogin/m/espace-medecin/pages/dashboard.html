<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord - Espace Médecin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-container {
            display: flex;
            min-height: 100vh;
            background: #f5f7fa;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #1F5DB0 0%, #3B9FD8 100%);
            color: white;
            padding: 30px 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            margin-bottom: 30px;
            font-size: 20px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            margin-bottom: 15px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        .main-content {
            flex: 1;
            padding: 40px;
        }

        .header-dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-dashboard h1 {
            font-size: 28px;
            color: #1a1a1a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1F5DB0, #3B9FD8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .card h3 {
            color: #1a1a1a;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .card-number {
            font-size: 32px;
            color: #3B9FD8;
            font-weight: 700;
        }

        .card-text {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 15px 20px;
            }

            .sidebar ul {
                display: flex;
                gap: 20px;
            }

            .main-content {
                padding: 20px;
            }

            .header-dashboard {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2><i class="fas fa-heart"></i> Médecin</h2>
            <ul>
                <li><a href="#"><i class="fas fa-home"></i> Accueil</a></li>
                <li><a href="#"><i class="fas fa-calendar-alt"></i> Consultations</a></li>
                <li><a href="#"><i class="fas fa-users"></i> Patients</a></li>
                <li><a href="#"><i class="fas fa-file-medical"></i> Dossiers</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Paramètres</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header-dashboard">
                <div>
                    <h1>Bienvenue, Dr. Ahmed</h1>
                    <p style="color: #666; margin-top: 5px;">Vous avez 3 consultations aujourd'hui</p>
                </div>
                <div class="user-info">
                    <div class="user-avatar">DR</div>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Déconnexion
                    </button>
                </div>
            </div>

            <!-- Dashboard Cards -->
            <div class="dashboard-grid">
                <div class="card">
                    <h3><i class="fas fa-calendar-check" style="color: #3B9FD8;"></i> Consultations Today</h3>
                    <div class="card-number">3</div>
                    <div class="card-text">Programmées pour aujourd'hui</div>
                </div>

                <div class="card">
                    <h3><i class="fas fa-users" style="color: #7FD856;"></i> Total Patients</h3>
                    <div class="card-number">256</div>
                    <div class="card-text">Patients actifs</div>
                </div>

                <div class="card">
                    <h3><i class="fas fa-file-alt" style="color: #f39c12;"></i> Dossiers</h3>
                    <div class="card-number">1,024</div>
                    <div class="card-text">Dossiers archivés</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            if (confirm('Êtes-vous sûr de vouloir vous déconnecter?')) {
                window.location.href = '../index.html';
            }
        }
    </script>
</body>
</html>
