<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupérer mot de passe - Espace Médecin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-wrapper">
            <!-- Bouton Retour -->
            <a href="../index.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Retour
            </a>

            <!-- Logo et Titre -->
            <div class="header">
                <div class="logo-container">
                    <svg class="logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <!-- Cœur gauche (vert) -->
                        <g id="heart-left">
                            <path d="M 100 160 C 60 130 30 100 30 75 C 30 55 45 40 60 40 C 75 40 90 55 100 70" 
                                  fill="none" stroke="#7FD856" stroke-width="8" stroke-linecap="round"/>
                        </g>
                        <!-- Cœur droit (bleu) -->
                        <g id="heart-right">
                            <path d="M 100 160 C 140 130 170 100 170 75 C 170 55 155 40 140 40 C 125 40 110 55 100 70" 
                                  fill="none" stroke="#3B9FD8" stroke-width="8" stroke-linecap="round"/>
                        </g>
                        <!-- Ligne ECG (vert à bleu) -->
                        <polyline points="50,100 60,100 65,85 70,110 75,95 85,100 150,100" 
                                  fill="none" stroke="url(#gradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- Croix médicale (bleu) -->
                        <g id="medical-cross">
                            <rect x="95" y="75" width="10" height="30" fill="#3B9FD8"/>
                            <rect x="80" y="90" width="40" height="10" fill="#3B9FD8"/>
                        </g>
                        <!-- Gradient -->
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#7FD856;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#3B9FD8;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>Récupérer le mot de passe</h1>
                <p class="subtitle">Entrez votre email pour réinitialiser votre mot de passe</p>
            </div>

            <!-- Formulaire de récupération -->
            <form class="login-form" id="recoveryForm">
                <!-- Champ Email -->
                <div class="form-group">
                    <label for="recovery-email">Adresse email <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="recovery-email" 
                            name="email" 
                            placeholder="votre.email@domaine.com"
                            required
                        >
                    </div>
                </div>

                <!-- Bouton Récupération -->
                <button type="submit" class="btn-login">
                    Envoyer le lien de réinitialisation <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <!-- Message info -->
            <div class="footer-text">
                Vous pouvez aussi revenir à la 
                <a href="../index.html" class="link-signup">page de connexion admin</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('recoveryForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('recovery-email').value.trim();

            if (!email) {
                alert('Veuillez entrer votre adresse email');
                return;
            }

            setTimeout(() => {
                window.location.href = '../index.html';
            }, 500);
        });
    </script>
</body>
</html>
