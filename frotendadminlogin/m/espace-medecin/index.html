<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Admin - Connexion</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-wrapper">


            <!-- Logo et Titre -->
            <div class="header">
                <div class="logo-container">
                    <svg class="logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#7FD856;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#3B9FD8;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#1F5DB0;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <path d="M100,160 C50,130 20,100 20,70 C20,45 40,30 60,30 C75,30 88,38 100,50 C112,38 125,30 140,30 C160,30 180,45 180,70 C180,100 150,130 100,160 Z" fill="url(#heartGradient)" stroke="none"/>
                        <polyline points="45,95 55,95 60,80 65,105 70,90 80,95 130,95" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
                        <g id="medical-cross">
                            <rect x="92" y="70" width="16" height="40" fill="white" rx="2"/>
                            <rect x="75" y="87" width="50" height="16" fill="white" rx="2"/>
                        </g>
                    </svg>
                </div>
                <h1>Bon retour !</h1>
                <p class="subtitle">Connectez-vous à votre espace administrateur Mediko</p>
            </div>

            <!-- Formulaire de connexion -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Adresse email <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="votre.email@gmail.com"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="actions-row">
                    <a href="pages/forgot-password.html" class="forgot-password">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-login">
                    Se connecter <i class="fas fa-arrow-right"></i>
                </button>

                <p class="bottom-note">
                    Nouveau sur Mediko ? <a href="pages/signup.html">Créer un compte</a>
                </p>
            </form>

        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
